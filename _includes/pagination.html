<div class="row">
    {% if page.previous %}
    <div class="col-sm">
        <a href="{{ page.previous.url | relative_url }}">
            <div class="d-flex align-items-center justify-content-center p-3 py-5 mb-2 bg-light rounded">
                <svg width="1em" height="1em" viewBox="0 0 16 16" class="bi bi-arrow-left-circle" fill="currentColor"
                    xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" d="M8 15A7 7 0 1 0 8 1a7 7 0 0 0 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z">
                    </path>
                    <path fill-rule="evenodd"
                        d="M12 8a.5.5 0 0 1-.5.5H5.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5H11.5a.5.5 0 0 1 .5.5z">
                    </path>
                </svg>
                <small></small>{{ site.data.text[site.locale].previous | default: 'Previous' }}:{{ page.previous.title | markdownify | strip_html }}</small>
            </div>
        </a>
    </div>
    {% endif %}

    {% if page.next %}
    <div class="col-sm">
        <a href="{{ page.next.url | relative_url }}">
            <div class="d-flex align-items-center justify-content-center p-3 py-5 mb-2 bg-light rounded">
                <svg width="1em" height="1em" viewBox="0 0 16 16" class="bi bi-arrow-right-circle" fill="currentColor"
                    xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" d="M8 15A7 7 0 1 0 8 1a7 7 0 0 0 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z">
                    </path>
                    <path fill-rule="evenodd"
                        d="M4 8a.5.5 0 0 0 .5.5h5.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3a.5.5 0 0 0 0-.708l-3-3a.5.5 0 1 0-.708.708L10.293 7.5H4.5A.5.5 0 0 0 4 8z">
                    </path>
                </svg>
                <small>{{ site.data.text[site.locale].next | default: 'Next' }}:{{ page.next.title | markdownify | strip_html }}</small>
            </div>
        </a>
    </div>
    {% endif %}

</div>
